name: Stage npm release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  stage:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/crawldex-report
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm stage publish
